    <div id="root">
      <noscript>
        <h1>Rho — Engineering Problem Solver</h1>
        <p>An AI-powered web app for solving undergraduate mechanical engineering problems step by step.</p>
        <h2>What it does</h2>
        <p>Enter a problem in plain English (heat transfer, statics, fluid mechanics, thermodynamics, or dynamics). Rho returns a structured solution with given values, relevant formulas, step-by-step calculations, KaTeX-rendered LaTeX equations, a final answer, and a 2-3 sentence physical explanation.</p>
        <h2>How it works</h2>
        <p>Frontend: React + Vite, deployed on Vercel. Backend: Node + Express on Render, calling Google Gemini with a model fallback chain (gemini-2.5-flash → gemini-2.5-flash-lite → gemini-2.5-pro) and exponential-backoff retries on 404 / 429 / 503. Equations rendered with KaTeX. Solution history stored in localStorage.</p>
        <h2>API</h2>
        <p>POST https://engineering-solver-backend.onrender.com/solve with JSON body { "problem": "your problem in plain English" } returns a structured JSON solution.</p>
        <h2>Source</h2>
        <p>https://github.com/SolTalebali/rho-engineering-solver</p>
